<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyst • assigned assets (read‑only)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            --primary: #5DA1A1;
            --primary-hover: #4e9393;
            --green: #10b981;
            --red: #ef4444;
            --amber: #f59e0b;
            --text-primary: #111111;
            --text-secondary: #555555;
            --text-muted: #888888;
            --bg: #FFFFFF;
            --card-bg: #FFFFFF;
            --border: #e8e8e8;
            --shadow-sm: 0 3.2px 9.6px rgba(0,0,0,0.06);
            --shadow-md: 0 9.6px 25.6px rgba(0,0,0,0.08);
            --radius: 12.8px;
            --transition: all 0.3s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            height: 100%;
            overflow-x: hidden;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            padding: 32px;
            min-height: 100vh;
            overflow-y: auto;
        }
        
        .page-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 32px;
            color: var(--text-primary);
        }
        
        /* Stats Cards Section */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        
        .stat-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .stat-card:nth-child(1) .stat-icon { background: rgba(93,161,161,0.15); color: var(--primary); }
        .stat-card:nth-child(2) .stat-icon { background: rgba(16,185,129,0.15); color: var(--green); }
        .stat-card:nth-child(3) .stat-icon { background: rgba(245,158,11,0.15); color: var(--amber); }
        .stat-card:nth-child(4) .stat-icon { background: rgba(239,68,68,0.15); color: var(--red); }
        
        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .stat-change {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        .change-positive { color: var(--green); }
        .change-negative { color: var(--red); }
        
        /* Main Content Grid */
        .overview-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 60px;
        }
        
        @media (max-width: 1200px) {
            .overview-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* Assets Grid – CARDS PURELY VISUAL, NO CLICK */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .section-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        .assets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        /* ⚠️  FORCE non‑clickable: no pointer events, default cursor */
        .asset-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: var(--transition);
            height: 100%;
            cursor: default;
            pointer-events: none;      /* blocks all clicks/hover effects that suggest interactivity */
            user-select: text;
        }
        
        /* hover effect only for visual polish – no click implication */
        .asset-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
            border-color: var(--border);
        }
        
        .asset-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .asset-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
        }
        
        .asset-category {
            font-size: 12px;
            color: var(--primary);
            background: rgba(93,161,161,0.15);
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 500;
            white-space: nowrap;
            margin-left: 8px;
        }
        
        .asset-detail {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .asset-detail i {
            width: 16px;
            color: var(--text-muted);
        }
        
        .asset-status {
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 500;
            margin-top: 8px;
            display: inline-block;
        }
        
        .status-active { background: rgba(16,185,129,0.1); color: var(--green); }
        .status-inactive { background: rgba(239,68,68,0.1); color: var(--red); }
        
        /* Sidebar */
        .sidebar-section {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }
        
        .sidebar-section:last-child {
            margin-bottom: 0;
        }
        
        .categories-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(93,161,161,0.05);
            border-radius: 8px;
            transition: var(--transition);
        }
        
        .category-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .category-count {
            font-size: 12px;
            color: var(--text-muted);
            background: white;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }
        
        .activity-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .activity-item:last-child {
            border-bottom: none;
        }
        
        .activity-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .activity-content {
            flex: 1;
        }
        
        .activity-text {
            font-size: 13px;
            color: var(--text-primary);
            line-height: 1.4;
        }
        
        .activity-time {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        
        .asset-summary {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        
        .asset-summary-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .asset-summary-item i {
            color: var(--primary);
        }
        
        /* Loading / empty states */
        .loading-spinner {
            text-align: center;
            padding: 80px;
            color: var(--text-muted);
            font-size: 16px;
        }
        
        .loading-spinner i {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(93,161,161,0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .no-assets {
            grid-column: 1 / -1;
            text-align: center;
            padding: 64px 32px;
            color: var(--text-muted);
            font-size: 16px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            color: var(--border);
        }
        
        .empty-state h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }
        
        /* responsive */
        @media (max-width: 1024px) {
            body { padding: 24px; }
            .stats-container { grid-template-columns: repeat(2, 1fr); }
            .assets-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
        }
        
        @media (max-width: 768px) {
            body { padding: 16px; }
            .stats-container { grid-template-columns: 1fr; }
            .overview-grid { gap: 20px; }
            .assets-grid { grid-template-columns: 1fr; }
            .section-header { flex-direction: column; align-items: flex-start; gap: 12px; }
            .asset-header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .asset-category { margin-left: 0; }
        }
        
        .real-time-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--green);
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .analyst-badge {
            font-size: 10px;
            background: var(--primary);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
            display: inline-block;
            vertical-align: middle;
        }
        
        .analyst-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-left: 4px solid var(--primary);
            border-radius: 8px;
            box-shadow: var(--shadow-lg);
            padding: 16px 20px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .notification-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }
    </style>
</head>
<body>
    <h1 class="page-title">My assigned assets (read‑only)</h1>
    
    <!-- stats cards -->
    <div id="statsContainer" class="stats-container">
        <div class="stat-card">
            <div class="stat-value">
                <div class="stat-icon"><i class="fas fa-boxes"></i></div>
                <span id="totalAssets">0</span>
            </div>
            <div class="stat-label">Total assigned</div>
            <div class="stat-change" id="assetChange">Updated: <span id="updateTime">—</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-value">
                <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                <span id="activeAssets">0</span>
            </div>
            <div class="stat-label">Active assets</div>
            <div class="stat-change change-positive" id="activeRate">Active rate: 0%</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">
                <div class="stat-icon"><i class="fas fa-tags"></i></div>
                <span id="totalCategories">0</span>
            </div>
            <div class="stat-label">Categories</div>
            <div class="stat-change" id="categoryChange">Most used: <span id="topCategory">None</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-value">
                <div class="stat-icon"><i class="fas fa-shield-alt"></i></div>
                <span id="totalRisks">0</span>
            </div>
            <div class="stat-label">Risk items</div>
            <div class="stat-change" id="riskChange">Coverage: <span id="coverageRate">0%</span></div>
        </div>
    </div>
    
    <!-- loading / main content -->
    <div id="loading" class="loading-spinner"><i></i> Loading assigned assets...</div>
    
    <div id="content" style="display: none;">
        <div class="overview-grid">
            <!-- left column: recent assets (non‑clickable cards) -->
            <div>
                <div class="section-header">
                    <div>
                        <h2 class="section-title">Recently assigned / updated</h2>
                        <div class="section-subtitle">Overview — interaction disabled</div>
                    </div>
                </div>
                <div id="recentAssetsGrid" class="assets-grid"></div>
            </div>
            <!-- right column: categories & activity -->
            <div>
                <div class="sidebar-section">
                    <h3 class="section-title" style="margin-bottom: 16px;">Asset categories (assigned)</h3>
                    <div id="categoriesList" class="categories-list"></div>
                </div>
                <div class="sidebar-section">
                    <div class="section-header" style="margin-bottom: 16px;">
                        <h3 class="section-title">Activity feed</h3>
                        <span class="real-time-indicator" title="Live updates active"></span>
                    </div>
                    <div id="recentActivity" class="activities-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ************************************************************
            // YOUR ORIGINAL SCRIPT STRUCTURE – INTACT, BUT WITH ONE CHANGE:
            // fetchAnalystAssets now ONLY uses real API calls, NO mock data.
            // Also asset cards are non‑clickable (CSS handles that).
            // ************************************************************

            let analystAssets = [];
            let previousAssetCount = 0;
            let lastRefreshTime = null;
            let refreshIntervals = [];

            // --- main load function (preserved from your script) ---
            async function loadOverview() {
                const token = localStorage.getItem('token');
                if (!token) {
                    document.getElementById('loading').innerHTML = 
                        '<div class="empty-state">' +
                        '<i class="fas fa-lock"></i>' +
                        '<h3>Authentication Required</h3>' +
                        '<p>Please log in to view the asset overview</p>' +
                        '</div>';
                    return;
                }

                try {
                    clearAllIntervals();

                    // ONLY real API call, no fallback to demo
                    const assets = await fetchAnalystAssets(token);
                    analystAssets = assets;
                    previousAssetCount = assets.length;
                    lastRefreshTime = new Date();

                    updateAnalystStats(assets);
                    loadRecentAnalystAssets(assets);
                    loadAnalystCategories(assets);
                    generateAnalystActivityFromData(assets);
                    startAnalystRealTimeUpdates(token);

                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('content').style.display = 'block';

                } catch (err) {
                    console.error('Error loading analyst overview:', err);
                    document.getElementById('loading').innerHTML = 
                        '<div class="empty-state">' +
                        '<i class="fas fa-exclamation-circle" style="color:#ef4444;"></i>' +
                        '<h3>Error Loading Overview</h3>' +
                        '<p>' + err.message + '</p>' +
                        '<button onclick="location.reload()" style="padding:10px 20px;background:var(--primary);color:white;border:none;border-radius:6px;cursor:pointer;margin-top:12px;">Retry</button>' +
                        '</div>';
                }
            }

            // --- fetchAnalystAssets: your original logic, but we removed any mock fallback.
            // If all endpoints fail, we throw an error (no fake data).
            async function fetchAnalystAssets(token) {
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    const userRole = payload.role || 'analyst';
                    const userId = payload.userID || payload.sub;
                    
                    console.log('Analyst fetching assets. Role:', userRole, 'User ID:', userId);

                    // 1. Try /api/analyst/assigned-assets
                    try {
                        const response = await fetch('/api/analyst/assigned-assets', {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        if (response.ok) {
                            const data = await response.json();
                            console.log('Analyst assigned assets loaded:', data.length);
                            return data;
                        }
                    } catch (err) { console.log('assigned-assets endpoint failed'); }

                    // 2. Try /api/analyst/overview
                    try {
                        const response = await fetch('/api/analyst/overview', {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        if (response.ok) {
                            const data = await response.json();
                            if (data.assignedAssets) {
                                console.log('Analyst overview loaded, assigned assets:', data.assignedAssets.length);
                                return data.assignedAssets;
                            }
                        }
                    } catch (err) { console.log('analyst/overview endpoint failed'); }

                    // 3. Try /api/user/assigned-assets
                    try {
                        const response = await fetch('/api/user/assigned-assets', {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        if (response.ok) {
                            const data = await response.json();
                            console.log('User assigned assets loaded:', data.length);
                            return data;
                        }
                    } catch (err) { console.log('user/assigned-assets endpoint failed'); }

                    // 4. Try /api/assets?assigned=true
                    try {
                        const response = await fetch('/api/assets?assigned=true', {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        if (response.ok) {
                            const data = await response.json();
                            console.log('Filtered assets loaded:', data.length);
                            return data;
                        }
                    } catch (err) { console.log('filtered assets endpoint failed'); }

                    // 5. Try /api/assets and filter manually (still using real data)
                    try {
                        const response = await fetch('/api/assets', {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        if (response.ok) {
                            const allAssets = await response.json();
                            // manual filter by assignment
                            const filtered = allAssets.filter(asset => 
                                asset.assignedTo === userId || 
                                (asset.assignedAnalysts && asset.assignedAnalysts.includes(userId))
                            );
                            console.log('All assets manually filtered to:', filtered.length);
                            // Even if filtered is empty, we return empty array (real data, not mock)
                            return filtered;
                        }
                    } catch (err) { console.log('all assets endpoint failed'); }

                    // If we reach here, no endpoint succeeded → throw error (no mock)
                    throw new Error('Unable to fetch assigned assets from any endpoint. Please check API connectivity.');

                } catch (err) {
                    console.error('fetchAnalystAssets critical error:', err);
                    throw err;  // propagate so UI shows error
                }
            }

            // --- everything below is exactly your original update functions, 
            // no changes needed, they work with real data. ---

            function updateAnalystStats(assets) {
                const total = assets.length;
                const active = assets.filter(a => a.status === 'active' || !a.status || a.status === '').length;
                const activeRate = total > 0 ? Math.round((active / total) * 100) : 0;
                
                const categories = [...new Set(assets.map(a => a.category).filter(Boolean))];
                const totalCategories = categories.length;

                const categoryCounts = {};
                assets.forEach(asset => { if (asset.category) categoryCounts[asset.category] = (categoryCounts[asset.category] || 0) + 1; });
                let topCategory = 'None', maxCount = 0;
                for (const [cat, cnt] of Object.entries(categoryCounts)) {
                    if (cnt > maxCount) { maxCount = cnt; topCategory = cat; }
                }

                const coverageRate = total > 0 ? Math.round((active / total) * 100) : 0;
                const totalRisks = assets.reduce((sum, a) => sum + (a.riskCount || 0), 0);

                document.getElementById('totalAssets').textContent = total;
                document.getElementById('activeAssets').textContent = active;
                document.getElementById('totalCategories').textContent = totalCategories;
                document.getElementById('topCategory').textContent = topCategory;
                document.getElementById('activeRate').textContent = `Active rate: ${activeRate}%`;
                document.getElementById('coverageRate').textContent = `${coverageRate}%`;
                document.getElementById('totalRisks').textContent = totalRisks;

                updateTimestamp();
            }

            function updateTimestamp() {
                const now = new Date();
                document.getElementById('updateTime').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            }

            function loadRecentAnalystAssets(assets) {
                const container = document.getElementById('recentAssetsGrid');
                if (!assets || assets.length === 0) {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-box-open"></i><h3>No assets assigned</h3><p>You have no assigned assets yet.</p></div>';
                    return;
                }

                const recent = [...assets].sort((a,b) => new Date(b.updatedAt||b.createdAt) - new Date(a.updatedAt||a.createdAt)).slice(0,6);
                let html = '';
                recent.forEach(asset => {
                    const modified = new Date(asset.updatedAt || asset.createdAt || Date.now());
                    const status = asset.status === 'inactive' ? 'Inactive' : 'Active';
                    const statusClass = asset.status === 'inactive' ? 'status-inactive' : 'status-active';
                    const timeAgo = getTimeAgo(modified);

                    html += `
                        <div class="asset-card">
                            <div class="asset-header">
                                <div class="asset-name" title="${escapeHtml(asset.name || 'Unnamed')}">
                                    ${escapeHtml(asset.name || 'Unnamed')}
                                    <span class="analyst-badge">assigned</span>
                                </div>
                                <span class="asset-category">${escapeHtml(asset.category || 'Uncategorized')}</span>
                            </div>
                            <div class="asset-detail"><i class="fas fa-map-marker-alt"></i><span>${escapeHtml(asset.location || '—')}</span></div>
                            <div class="asset-detail"><i class="fas fa-user"></i><span>${escapeHtml(asset.owner || '—')}</span></div>
                            <div class="asset-detail"><i class="fas fa-clock"></i><span>Updated ${timeAgo}</span></div>
                            <div class="asset-summary">
                                <div class="asset-status ${statusClass}">${status}</div>
                                <div class="asset-summary-item"><i class="fas fa-calendar"></i><span>${modified.toLocaleDateString()}</span></div>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }

            function loadAnalystCategories(assets) {
                const catEl = document.getElementById('categoriesList');
                if (!assets.length) {
                    catEl.innerHTML = '<div class="empty-state" style="padding:20px 0;"><i class="fas fa-tag"></i><p>No categories</p></div>';
                    return;
                }
                const counts = {};
                assets.forEach(a => { let c = a.category || 'Uncategorized'; counts[c] = (counts[c] || 0) + 1; });
                const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0,5);
                let html = '';
                sorted.forEach(([cat, cnt]) => {
                    let perc = Math.round((cnt / assets.length) * 100);
                    html += `<div class="category-item"><span class="category-name">${escapeHtml(cat)}</span><span class="category-count">${cnt} (${perc}%)</span></div>`;
                });
                catEl.innerHTML = html;
            }

            function generateAnalystActivityFromData(assets) {
                const activityDiv = document.getElementById('recentActivity');
                let activities = [];

                if (assets.length > 0) {
                    const newest = assets.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt))[0];
                    const updated = assets.sort((a,b) => new Date(b.updatedAt||b.createdAt) - new Date(a.updatedAt||a.createdAt))[0];
                    const activeCount = assets.filter(a => a.status !== 'inactive').length;
                    const perc = assets.length ? Math.round((activeCount/assets.length)*100) : 0;

                    if (newest) activities.push({ icon:'fas fa-user-check', color:'var(--green)', text:`Assigned: ${escapeHtml(newest.name)}`, time: getTimeAgo(new Date(newest.createdAt)) });
                    if (updated && updated.updatedAt && new Date(updated.updatedAt) > new Date(updated.createdAt)) 
                        activities.push({ icon:'fas fa-edit', color:'var(--primary)', text:`Updated: ${escapeHtml(updated.name)}`, time: getTimeAgo(new Date(updated.updatedAt)) });
                    activities.push({ icon:'fas fa-user-tie', color:'var(--green)', text:`${assets.length} assets assigned to you`, time: 'current' });
                    activities.push({ icon:'fas fa-shield-alt', color:'var(--primary)', text:`${activeCount} active (${perc}%)`, time: 'status' });
                    
                    const oldestActive = assets.filter(a => a.status !== 'inactive').sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt))[0];
                    if (oldestActive) {
                        let days = Math.floor((Date.now() - new Date(oldestActive.createdAt)) / (864e5));
                        activities.push({ icon:'fas fa-history', color:'var(--amber)', text:`Oldest active: ${days} days`, time: 'assignment' });
                    }
                } else {
                    activities.push({ icon:'fas fa-info-circle', color:'var(--text-muted)', text:'No assigned assets', time: 'now' });
                }

                let html = '';
                activities.forEach(act => {
                    html += `
                        <div class="activity-item">
                            <div class="activity-icon" style="background: rgba(93,161,161,0.1); color: ${act.color};"><i class="${act.icon}"></i></div>
                            <div class="activity-content"><div class="activity-text">${act.text}</div><div class="activity-time">${act.time}</div></div>
                        </div>
                    `;
                });
                activityDiv.innerHTML = html;
            }

            function startAnalystRealTimeUpdates(token) {
                clearAllIntervals();
                const interval = setInterval(() => {
                    updateTimestamp();
                    // optional: you could re‑fetch if you want real‑time count changes, but keep it light
                }, 30000);
                refreshIntervals.push(interval);
            }

            function getTimeAgo(date) {
                const diff = (Date.now() - date) / 1000;
                if (diff < 60) return 'just now';
                if (diff < 3600) return `${Math.floor(diff/60)} min ago`;
                if (diff < 86400) return `${Math.floor(diff/3600)} h ago`;
                return `${Math.floor(diff/86400)} d ago`;
            }

            function escapeHtml(t) {
                if (!t) return '';
                let div = document.createElement('div');
                div.textContent = t;
                return div.innerHTML;
            }

            function clearAllIntervals() {
                refreshIntervals.forEach(i => clearInterval(i));
                refreshIntervals = [];
            }

            // no click handler – cards are completely non‑interactive via CSS

            window.addEventListener('load', loadOverview);
            window.addEventListener('beforeunload', clearAllIntervals);
        })();
    </script>
</body>
</html>
